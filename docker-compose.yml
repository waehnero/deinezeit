services:
  db:
    image: postgres:16-alpine
    container_name: deinezeit_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  minio:
    image: minio/minio:latest
    container_name: deinezeit_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - internal

  backend:
    build: ./backend
    container_name: deinezeit_backend
    restart: always
    depends_on:
      - db
      - minio
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
      FRONTEND_URL: ${FRONTEND_URL}
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: deinezeit-files
      MINIO_PUBLIC_URL: ${FRONTEND_URL}
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID}
      WEBAUTHN_RP_NAME: ${WEBAUTHN_RP_NAME}
      INSTALL_DIR: /opt/deinezeit
      APP_VERSION: ${APP_VERSION:-1.12.31}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/deinezeit:/opt/deinezeit
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        # Cache-Buster: wird vom Deploy mit dem aktuellen Git-SHA gesetzt, damit
        # der Frontend-Build den neuen Quellcode garantiert neu kompiliert.
        GIT_SHA: ${GIT_SHA:-dev}
    container_name: deinezeit_frontend
    restart: always
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: deinezeit_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/maintenance.html:/usr/share/nginx/html/maintenance.html:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - internal
      - external

  certbot:
    image: certbot/certbot
    container_name: deinezeit_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    command: /bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'


volumes:
  postgres_data:
  minio_data:
  certbot_www:
  certbot_conf:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
