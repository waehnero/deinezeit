version: "3.9"

# Lokale Test-Konfiguration für Windows mit Docker Desktop
# Verwendung: Doppelklick auf start-lokal.bat
# Erreichbar unter: http://localhost

services:
  db:
    image: postgres:16-alpine
    container_name: deinezeit_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    networks:
      - deinezeit_local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: deinezeit_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
      FRONTEND_URL: http://localhost
      WEBAUTHN_RP_ID: localhost
      WEBAUTHN_RP_NAME: DeineZeit (Lokal)
    networks:
      - deinezeit_local
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: deinezeit_frontend
    restart: unless-stopped
    networks:
      - deinezeit_local

  nginx:
    image: nginx:alpine
    container_name: deinezeit_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - deinezeit_local

volumes:
  postgres_local_data:

networks:
  deinezeit_local:
    driver: bridge
