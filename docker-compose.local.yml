version: "3.9"

# Lokale Test-Konfiguration für Windows mit Docker Desktop
# Verwendung: Doppelklick auf start-lokal.bat
# Erreichbar unter: http://localhost

services:
  db:
    image: postgres:16-alpine
    container_name: deinezeit_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    networks:
      - deinezeit_local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: deinezeit_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_local_data:/data
    ports:
      - "9001:9001"
    networks:
      - deinezeit_local

  backend:
    build: ./backend
    container_name: deinezeit_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
      FRONTEND_URL: http://localhost
      WEBAUTHN_RP_ID: localhost
      WEBAUTHN_RP_NAME: DeineZeit (Lokal)
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET: deinezeit-files
      MINIO_PUBLIC_URL: http://localhost
      APP_VERSION: ${APP_VERSION:-1.12.24}
      DEPLOY_MODE: local
    networks:
      - deinezeit_local
    volumes:
      - ./backend:/app
      - ./CHANGELOG.md:/opt/deinezeit/CHANGELOG.md:ro
      - ./backup.cfg:/opt/deinezeit/backup.cfg

  frontend:
    build: ./frontend
    container_name: deinezeit_frontend
    restart: unless-stopped
    networks:
      - deinezeit_local

  nginx:
    image: nginx:alpine
    container_name: deinezeit_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - deinezeit_local

volumes:
  postgres_local_data:
  minio_local_data:

networks:
  deinezeit_local:
    driver: bridge
