name: Auto-Version

# ── DEAKTIVIERT (Stand 29.06.2026) ───────────────────────────────────────────
# Dieser Workflow pushte den Versions-Bump direkt nach main. Da main per
# Ruleset geschützt ist ("Changes must be made through a pull request"), wurde
# der Push abgelehnt (GH013) und der Lauf schlug bei JEDEM Merge fehl. Ein
# gezielter Bypass für GitHub Actions ist in diesem Repo nicht verfügbar.
#
# Daher ist der automatische Trigger abgeschaltet. Der Job-Code bleibt erhalten
# und ist weiterhin MANUELL über "Run workflow" (workflow_dispatch) startbar –
# der finale Push auf main scheitert dann aber weiterhin am Schutz.
#
# Version stattdessen bei Releases MANUELL bumpen (siehe CLAUDE.md):
#   bump-version.ps1  bzw.  python scripts/auto_version.py  auf einem
#   Feature-Branch ausführen und per Pull Request mergen.
#
# Reaktivieren: den 'push:'-Trigger unten wieder einkommentieren – sobald
# ein Bypass für den Bot eingerichtet ist.
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:      # nur noch manuell startbar
  # push:                 # DEAKTIVIERT – siehe Kommentar oben
  #   branches: [main]

jobs:
  bump-version:
    name: Version automatisch erhöhen
    runs-on: ubuntu-latest

    # Nicht ausführen wenn der letzte Commit bereits ein Versions-Bump ist
    if: "!startsWith(github.event.head_commit.message, 'chore: Version')"

    permissions:
      contents: write   # Damit der Workflow zurück in main pushen darf

    steps:
      - name: Checkout (vollständige History)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: Git-Benutzer konfigurieren
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Version-Bump ausführen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/auto_version.py

      - name: Änderungen pushen
        run: git push
