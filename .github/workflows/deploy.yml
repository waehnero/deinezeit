# ============================================================
# DeineZeit – Automatisches Deployment (CD)
# Läuft bei jedem Push auf den main-Branch
#
# Voraussetzungen (einmalig in GitHub einstellen):
#   Settings → Secrets and variables → Actions → New repository secret
#
#   SSH_HOST          IP oder Domain deines Servers
#   SSH_USER          Linux-Benutzer (z.B. root oder deinezeit)
#   SSH_PRIVATE_KEY   Privater SSH-Schlüssel (Inhalt von ~/.ssh/id_rsa)
#   DEPLOY_PATH       Pfad auf dem Server, z.B. /opt/deinezeit
# ============================================================

name: Deploy → Produktion

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: "Auf Server deployen"
    runs-on: ubuntu-latest

    # Nur deployen wenn alle CI-Checks bestanden haben
    needs: []   # Parallel zu CI – oder: needs: [sicherheit-backend, docker-build]

    environment:
      name: production
      url: https://${{ vars.DOMAIN || 'deine-domain.at' }}

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: "SSH-Schlüssel einrichten"
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: "Bekannten Host eintragen (Fingerprint)"
        run: |
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: "Code auf Server übertragen"
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='backend/static' \
            --exclude='postgres_data' \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/

      - name: "Docker-Images bauen & Dienste neu starten"
        # -o pipefail + expliziter SSH-Aufruf: Der Exit-Code des Remote-Skripts
        # wird so zuverlässig an den GitHub-Step durchgereicht. Schlägt das
        # Deploy-Skript fehl, wird der Step ROT (vorher blieb er fälschlich grün).
        shell: bash
        run: |
          set -euo pipefail
          # GIT_SHA als Cache-Buster an den Build übergeben (siehe frontend/Dockerfile)
          GIT_SHA="${{ github.sha }}"
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "GIT_SHA='$GIT_SHA' DEPLOY_PATH='${{ secrets.DEPLOY_PATH }}' bash -se" << 'ENDSSH'
            set -euo pipefail
            cd "$DEPLOY_PATH"

            echo "▶ Neue Images bauen (Cache-Buster GIT_SHA=$GIT_SHA)..."
            # --no-cache UND GIT_SHA-Build-Arg: doppelt abgesichert, dass der
            # Frontend-Build den neuen Quellcode wirklich kompiliert.
            GIT_SHA="$GIT_SHA" docker compose build --no-cache --build-arg GIT_SHA="$GIT_SHA"

            echo "▶ Datenbank-Migrationen..."
            docker compose run --rm backend alembic upgrade head

            # --force-recreate: erzwingt das Neuerstellen ALLER Container aus den
            # frisch gebauten Images. Ohne dieses Flag lässt 'up -d' einen
            # laufenden Container stehen, wenn Compose keine Änderung erkennt.
            echo "▶ Dienste neu erstellen (aus neuen Images)..."
            docker compose up -d --force-recreate --remove-orphans

            echo "▶ Alte Images aufräumen..."
            docker image prune -f

            # Verifikation: Container müssen JÜNGER als 5 Minuten sein, sonst
            # wurden sie nicht erneuert -> Deploy als fehlgeschlagen werten.
            echo "▶ Prüfe, dass Container wirklich neu erstellt wurden..."
            for svc in frontend backend; do
              cid=$(docker compose ps -q "$svc")
              started=$(docker inspect -f '{{.State.StartedAt}}' "$cid")
              started_ts=$(date -d "$started" +%s 2>/dev/null || echo 0)
              now_ts=$(date +%s)
              age=$(( now_ts - started_ts ))
              echo "   $svc: vor ${age}s gestartet"
              if [ "$age" -gt 300 ]; then
                echo "✗ $svc wurde NICHT neu erstellt (zu alt) - Deploy fehlgeschlagen."
                exit 1
              fi
            done

            echo "✓ Deployment abgeschlossen!"
          ENDSSH

      - name: "Healthcheck"
        run: |
          echo "Warte 15 Sekunden auf Start..."
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://${{ vars.DOMAIN || secrets.SSH_HOST }}/api/health || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✓ App läuft (HTTP $STATUS)"
          else
            echo "⚠ Healthcheck: HTTP $STATUS – bitte Logs prüfen"
            echo "  ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"
            echo "  cd ${{ secrets.DEPLOY_PATH }} && docker compose logs --tail=50"
          fi

      - name: "Deployment-Zusammenfassung"
        if: always()
        run: |
          echo "## Deployment-Ergebnis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Zeitpunkt:** $(date '+%d.%m.%Y %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "- **Gestartet von:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
