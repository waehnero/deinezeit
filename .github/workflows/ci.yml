# ============================================================
# DeineZeit – Automatische Qualitätsprüfung (CI)
# Läuft bei jedem Push und Pull Request
# ============================================================

name: CI – Qualitätsprüfung

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Python-Sicherheitsprüfung ──────────────────────────────────────────
  sicherheit-backend:
    name: "Backend: Sicherheit & Abhängigkeiten"
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Abhängigkeiten installieren
        run: pip install pip-audit bandit -r backend/requirements.txt

      - name: "Sicherheitslücken in Paketen prüfen (pip-audit)"
        run: pip-audit -r backend/requirements.txt --format=columns

      - name: "Sicherheitsprobleme im Code prüfen (bandit)"
        run: bandit -r backend/app/ -ll -q

  # ── 2. Automatisierte Tests (pytest) ──────────────────────────────────────
  tests-backend:
    name: "Backend: Tests (pytest)"
    runs-on: ubuntu-latest

    # PostgreSQL als Service-Container – die Tests laufen gegen eine echte DB,
    # weil die Modelle Postgres-Typen (UUID, JSONB) nutzen.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: deinezeit
          POSTGRES_PASSWORD: deinezeit
          POSTGRES_DB: deinezeit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U deinezeit"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Pflicht-Variablen, die app/core/config.py beim Import erwartet.
      TEST_DATABASE_URL: postgresql://deinezeit:deinezeit@localhost:5432/deinezeit_test
      DATABASE_URL: postgresql://deinezeit:deinezeit@localhost:5432/deinezeit_test
      SECRET_KEY: ci-test-secret-key-nicht-fuer-produktion

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: "Systembibliotheken (WeasyPrint: pango/cairo)"
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpango-1.0-0 libpangocairo-1.0-0 libcairo2 \
            libgdk-pixbuf-2.0-0 shared-mime-info

      - name: Abhängigkeiten installieren
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: "Tests ausführen"
        working-directory: backend
        run: python -m pytest

  # ── 3. Docker-Build prüfen ────────────────────────────────────────────────
  docker-build:
    name: "Docker-Images bauen"
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: ".env für Build erstellen"
        run: |
          cp .env.example .env
          sed -i 's/BITTE_AENDERN_[^ ]*/test_value_ci/g' .env

      - name: "Backend-Image bauen"
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: "Frontend-Image bauen"
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Konfiguration prüfen ───────────────────────────────────────────────
  konfiguration:
    name: "Konfiguration & Secrets"
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: ".env.example vollständig?"
        run: |
          echo "Prüfe .env.example..."
          required_vars="DB_USER DB_PASSWORD DB_NAME SECRET_KEY FRONTEND_URL DOMAIN APP_ENV"
          for var in $required_vars; do
            if grep -q "^${var}=" .env.example; then
              echo "  ✓ $var vorhanden"
            else
              echo "  ✗ $var fehlt in .env.example!"
              exit 1
            fi
          done
          echo "Alle Pflichtfelder vorhanden."

      - name: "Keine echten Secrets im Code?"
        run: |
          echo "Prüfe auf versehentlich eingecheckte Secrets..."
          # Suche nach Mustern die auf echte Passwörter/Keys hinweisen
          if grep -r --include="*.py" --include="*.js" --include="*.jsx" \
            -E "(password|secret|api_key)\s*=\s*['\"][^'\"]{8,}['\"]" \
            --exclude-dir=node_modules --exclude-dir=__pycache__ \
            . 2>/dev/null | grep -v "test\|example\|placeholder\|CHANGE\|your_"; then
            echo "⚠ Möglicherweise Secrets im Code gefunden – bitte prüfen!"
            exit 1
          fi
          echo "  ✓ Keine offensichtlichen Secrets gefunden."

      - name: ".env nicht im Repository?"
        run: |
          if [ -f .env ]; then
            echo "❌ FEHLER: .env Datei ist im Repository! Sofort entfernen mit:"
            echo "   git rm --cached .env"
            exit 1
          fi
          echo "  ✓ .env nicht eingecheckt"

      - name: "nginx Security-Header konfiguriert?"
        run: |
          conf="nginx/conf.d/app.conf"
          headers="X-Frame-Options X-Content-Type-Options Strict-Transport-Security"
          for h in $headers; do
            if grep -q "$h" "$conf"; then
              echo "  ✓ $h"
            else
              echo "  ✗ Security-Header fehlt: $h"
              exit 1
            fi
          done
