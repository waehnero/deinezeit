<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeineZeit – Wartung</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f4;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1c1917;
    }

    .card {
      background: #fff;
      border-radius: 1.25rem;
      padding: 2.5rem 3rem;
      max-width: 440px;
      width: 90%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .logo {
      width: 52px;
      height: 52px;
      background: #f97316;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
    }

    .logo span {
      color: #fff;
      font-weight: 700;
      font-size: 1.25rem;
      letter-spacing: -0.5px;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    p {
      color: #78716c;
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 1.75rem;
    }

    /* Spinner */
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #fed7aa;
      border-top-color: #f97316;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 1.5rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #fff7ed;
      color: #c2410c;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
      border: 1px solid #fed7aa;
    }

    .dot {
      width: 7px;
      height: 7px;
      background: #f97316;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .hint {
      margin-top: 1.5rem;
      font-size: 0.78rem;
      color: #a8a29e;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span>DZ</span></div>

    <div class="spinner"></div>

    <h1>System-Update läuft</h1>
    <p>
      DeineZeit wird gerade auf die neueste Version aktualisiert.<br />
      Dieser Vorgang dauert in der Regel <strong>2–5 Minuten</strong>.
    </p>

    <div class="badge">
      <div class="dot"></div>
      Update wird durchgeführt…
    </div>

    <p class="hint">
      Diese Seite aktualisiert sich automatisch, sobald das System wieder bereit ist.
    </p>
  </div>

  <script>
    // Alle 10 Sekunden prüfen ob Backend wieder verfügbar ist
    setInterval(async () => {
      try {
        const res = await fetch('/api/health', { cache: 'no-store' });
        if (res.ok) {
          window.location.reload();
        }
      } catch {
        // noch nicht verfügbar
      }
    }, 10_000);
  </script>
</body>
</html>
